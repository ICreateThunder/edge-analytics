name: Notify Deploy

on:
  push:
    branches: [main]

permissions: {}

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3
        with:
          token: ${{ secrets.DEPLOY_DISPATCH_TOKEN }}
          repository: ICreateThunder/edge-analytics-deploy
          event-type: deploy
          client-payload: '{"sha": "${{ github.sha }}", "ref": "${{ github.ref }}"}'
