name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ vars.RUST_TARGET }}

      - name: Install cross-compiler
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-deploy-${{ vars.RUST_TARGET }}-${{ hashFiles('Cargo.toml') }}

      - name: Build
        run: cargo build --release --target ${{ vars.RUST_TARGET }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 # v2

      - name: Build and push Docker image
        run: |
          IMAGE=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${{ github.sha }}
          cp target/${{ vars.RUST_TARGET }}/release/edge-analytics ./edge-analytics-binary
          docker buildx build --platform ${{ vars.DOCKER_PLATFORM }} -t $IMAGE --push .
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
        id: docker

      - name: Deploy via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids ${{ secrets.INSTANCE_ID }} \
            --document-name AWS-RunShellScript \
            --parameters "{\"commands\":[\"bash /home/ec2-user/analytics/deploy.sh ${{ steps.docker.outputs.image }}\"]}" \
            --query "Command.CommandId" \
            --output text)
          echo "Waiting for deployment..."
          for i in $(seq 1 30); do
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id $COMMAND_ID \
              --instance-id ${{ secrets.INSTANCE_ID }} \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")
            echo "Status: $STATUS"
            if [ "$STATUS" = "Success" ]; then
              echo "Deployment successful"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deployment failed: $STATUS"
              aws ssm get-command-invocation \
                --command-id $COMMAND_ID \
                --instance-id ${{ secrets.INSTANCE_ID }} \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi
          done
          echo "Deployment timed out"
          exit 1
